name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy whatsapp-webhook
        run: supabase functions deploy whatsapp-webhook --project-ref fnilyapvhhygfzcdxqjm --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-reminder
        run: supabase functions deploy send-reminder --project-ref fnilyapvhhygfzcdxqjm --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy admin-broadcast
        run: supabase functions deploy admin-broadcast --project-ref fnilyapvhhygfzcdxqjm --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy process-scheduled-broadcasts
        run: supabase functions deploy process-scheduled-broadcasts --project-ref fnilyapvhhygfzcdxqjm --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
